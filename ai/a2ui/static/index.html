<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A2UI - Agent to UI Interface</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 900px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 85vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h1 { font-size: 1.5rem; margin-bottom: 5px; }
        .header p { opacity: 0.9; font-size: 0.9rem; }
        .model-info {
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 10px;
            font-size: 0.8rem;
        }
        .agents-bar {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
            overflow-x: auto;
        }
        .agent-btn {
            padding: 10px 20px;
            border: 2px solid #ddd;
            border-radius: 25px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            font-size: 0.9rem;
        }
        .agent-btn:hover { border-color: #667eea; }
        .agent-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        .message.user { align-items: flex-end; }
        .message.assistant { align-items: flex-start; }
        .message-content {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }
        .message.assistant .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .message-meta {
            font-size: 0.75rem;
            color: #999;
            margin-top: 5px;
            padding: 0 5px;
        }
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 15px;
            background: white;
            border-radius: 18px;
            width: fit-content;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
        }
        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        .input-wrapper textarea {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #eee;
            border-radius: 25px;
            resize: none;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
            max-height: 120px;
        }
        .input-wrapper textarea:focus { border-color: #667eea; }
        .send-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
            transition: transform 0.2s, opacity 0.2s;
        }
        .send-btn:hover { transform: scale(1.05); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .options {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            font-size: 0.85rem;
        }
        .options label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            color: #666;
        }
        .quick-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .quick-btn {
            padding: 6px 12px;
            background: #f0f0f0;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.2s;
        }
        .quick-btn:hover { background: #e0e0e0; }
        .status-bar {
            padding: 8px 20px;
            background: #f8f9fa;
            font-size: 0.8rem;
            color: #666;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #eee;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        .status-dot.online { background: #4caf50; }
        .status-dot.offline { background: #f44336; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>A2UI - Agent to UI Interface</h1>
            <p>基于真实LLM的多Agent交互系统</p>
            <div class="model-info" id="modelInfo">加载中...</div>
        </div>

        <div class="agents-bar" id="agentsBar"></div>

        <div class="chat-area" id="chatArea">
            <div class="message assistant">
                <div class="message-content">你好！我是A2UI智能助手，使用真实的LLM模型为你服务。请选择一个Agent开始对话。</div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="messageInput" placeholder="输入消息..." rows="1" onkeydown="handleKeyDown(event)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">&#10148;</button>
            </div>
            <div class="options">
                <label><input type="checkbox" id="streamMode" checked> 流式输出</label>
                <label><input type="checkbox" id="wsMode"> WebSocket模式</label>
            </div>
            <div class="quick-actions" id="quickActions"></div>
        </div>

        <div class="status-bar">
            <span><span class="status-dot" id="statusDot"></span><span id="statusText">连接中...</span></span>
            <span id="sessionInfo">会话: default</span>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let currentAgent = 'ai_assistant';
        let sessionId = 'session_' + Date.now();
        let ws = null;
        let isLoading = false;

        const quickActionsByAgent = {
            'ai_assistant': ['你好', '你能做什么？', '帮我写一首诗', '解释一下量子计算'],
            'weather': ['北京', '上海', '广州', '深圳', '成都'],
            'calculator': ['100 + 200', '(50 + 30) * 2', '999 / 3', '123 * 456'],
            'coordinator': ['帮我查北京天气并计算温度转换', '分析一下今天的任务']
        };

        async function init() {
            await loadHealth();
            await loadAgents();
            updateQuickActions();
            document.getElementById('sessionInfo').textContent = '会话: ' + sessionId.slice(-8);
        }

        async function loadHealth() {
            try {
                const res = await fetch(API_BASE + '/health');
                const data = await res.json();
                document.getElementById('modelInfo').textContent = '模型: ' + data.model;
                document.getElementById('statusDot').className = 'status-dot online';
                document.getElementById('statusText').textContent = '已连接';
            } catch (e) {
                document.getElementById('statusDot').className = 'status-dot offline';
                document.getElementById('statusText').textContent = '连接失败';
            }
        }

        async function loadAgents() {
            try {
                const res = await fetch(API_BASE + '/agents');
                const agents = await res.json();
                const bar = document.getElementById('agentsBar');
                bar.innerHTML = agents.map(a =>
                    `<button class="agent-btn ${a.id === currentAgent ? 'active' : ''}"
                             onclick="selectAgent('${a.id}')" title="${a.description}">
                        ${a.icon} ${a.name}
                    </button>`
                ).join('');
            } catch (e) {
                console.error('加载Agent失败:', e);
            }
        }

        function selectAgent(agentId) {
            currentAgent = agentId;
            loadAgents();
            updateQuickActions();
        }

        function updateQuickActions() {
            const actions = quickActionsByAgent[currentAgent] || [];
            document.getElementById('quickActions').innerHTML = actions.map(a =>
                `<button class="quick-btn" onclick="quickSend('${a}')">${a}</button>`
            ).join('');
        }

        function quickSend(text) {
            document.getElementById('messageInput').value = text;
            sendMessage();
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message || isLoading) return;

            input.value = '';
            addMessage(message, 'user');

            const useStream = document.getElementById('streamMode').checked;
            const useWs = document.getElementById('wsMode').checked;

            isLoading = true;
            document.getElementById('sendBtn').disabled = true;

            if (useWs) {
                await sendViaWebSocket(message, useStream);
            } else if (useStream && currentAgent === 'ai_assistant') {
                await sendStreamRequest(message);
            } else {
                await sendHttpRequest(message);
            }

            isLoading = false;
            document.getElementById('sendBtn').disabled = false;
        }

        async function sendHttpRequest(message) {
            showTyping();
            try {
                const res = await fetch(API_BASE + '/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId,
                        agent_type: currentAgent
                    })
                });
                const data = await res.json();
                hideTyping();
                addMessage(data.response, 'assistant', currentAgent);
            } catch (e) {
                hideTyping();
                addMessage('请求失败: ' + e.message, 'assistant', 'error');
            }
        }

        async function sendStreamRequest(message) {
            const msgDiv = addMessage('', 'assistant', currentAgent, true);
            const contentDiv = msgDiv.querySelector('.message-content');

            try {
                const res = await fetch(API_BASE + '/chat/stream', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId,
                        agent_type: currentAgent
                    })
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let fullText = '';

                while (true) {
                    const {done, value} = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.type === 'chunk') {
                                    fullText += data.content;
                                    contentDiv.textContent = fullText;
                                    scrollToBottom();
                                }
                            } catch (e) {}
                        }
                    }
                }
            } catch (e) {
                contentDiv.textContent = '流式请求失败: ' + e.message;
            }
        }

        async function sendViaWebSocket(message, stream) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                ws = new WebSocket(`ws://${location.host}/ws/${sessionId}`);
                await new Promise((resolve, reject) => {
                    ws.onopen = resolve;
                    ws.onerror = reject;
                    setTimeout(reject, 5000);
                });
            }

            const msgDiv = stream && currentAgent === 'ai_assistant'
                ? addMessage('', 'assistant', currentAgent, true)
                : null;

            if (!msgDiv) showTyping();

            return new Promise((resolve) => {
                let fullText = '';

                ws.onmessage = (e) => {
                    const data = JSON.parse(e.data);

                    if (data.type === 'stream_chunk' && msgDiv) {
                        fullText += data.content;
                        msgDiv.querySelector('.message-content').textContent = fullText;
                        scrollToBottom();
                    } else if (data.type === 'stream_end' || data.type === 'response') {
                        if (!msgDiv) {
                            hideTyping();
                            addMessage(data.message || data.full_response, 'assistant', currentAgent);
                        }
                        resolve();
                    }
                };

                ws.send(JSON.stringify({
                    type: 'chat',
                    message: message,
                    agent_type: currentAgent,
                    stream: stream
                }));
            });
        }

        function addMessage(text, role, agent = '', isStream = false) {
            const chatArea = document.getElementById('chatArea');
            const div = document.createElement('div');
            div.className = 'message ' + role;
            div.innerHTML = `
                <div class="message-content">${text}</div>
                <div class="message-meta">${role === 'user' ? '你' : agent} - ${new Date().toLocaleTimeString()}</div>
            `;
            chatArea.appendChild(div);
            scrollToBottom();
            return div;
        }

        function showTyping() {
            const chatArea = document.getElementById('chatArea');
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'typingIndicator';
            div.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
            chatArea.appendChild(div);
            scrollToBottom();
        }

        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        function scrollToBottom() {
            const chatArea = document.getElementById('chatArea');
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        init();
    </script>
</body>
</html>
